# ============================================
# Identity & SSO Service - Docker Compose
# ============================================
# Layered N-tier architecture (single application).
# Usage:
#   docker compose up --build -d    (start all)
#   docker compose down -v          (stop & remove volumes)
#   docker compose logs -f          (view logs)

services:
  # ─── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - identity-network

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: identity-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - identity-network

  # ─── Identity & SSO Service (layered N-tier app) ───
  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: identity-and-sso-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${AUTH_DB_NAME:-auth_db}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${AUTH_DB_NAME:-auth_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - identity-network

# ─── Volumes ──────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────
networks:
  identity-network:
    driver: bridge
