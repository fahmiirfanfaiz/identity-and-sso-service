# ============================================
# Bidding Capstone - Docker Compose
# ============================================
# Usage:
#   docker compose up --build -d    (start all)
#   docker compose down -v          (stop & remove volumes)
#   docker compose logs -f          (view logs)

services:
  # ─── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bidding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidding-network

  # ─── Template Service (contoh, copy untuk service baru) ───
  template-service:
    build:
      context: ./services/template-service
      dockerfile: Dockerfile
      target: dev
    container_name: bidding-template-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      DB_NAME: ${AUTH_DB_NAME:-auth_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
    ports:
      - "3000:3000"
    volumes:
      - ./services/template-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bidding-network

  # ─── Auth Service ───────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: dev
    container_name: bidding-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/auth_db?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/auth_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    ports:
      - "3001:3000"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bidding-network

# ─── Volumes ──────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────
networks:
  bidding-network:
    driver: bridge
