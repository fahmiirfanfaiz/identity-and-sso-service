# ============================================
# Bidding Capstone - CI/CD Pipeline
# ============================================
# Runs on push to main/develop and on PRs to main

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint ─────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [template-service]  # Tambah service baru di sini

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run lint
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

  # ─── Docker Build Verify ──────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Verify containers start
        run: |
          cp .env.example .env
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down -v
